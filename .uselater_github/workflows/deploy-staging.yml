name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run linting
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest --tb=short

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm lint

      - name: Run build
        run: pnpm build

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    outputs:
      backend_image: ${{ steps.images.outputs.BACKEND_IMAGE }}
      frontend_image: ${{ steps.images.outputs.FRONTEND_IMAGE }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image names (lowercase)
        id: images
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/${REPO}/backend" >> $GITHUB_OUTPUT
          echo "FRONTEND_IMAGE=ghcr.io/${REPO}/frontend" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: true
          tags: ${{ steps.images.outputs.BACKEND_IMAGE }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: true
          tags: ${{ steps.images.outputs.FRONTEND_IMAGE }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to DigitalOcean Staging
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: staging
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          BACKEND_IMG: ${{ needs.build-and-push.outputs.backend_image }}:staging
          FRONTEND_IMG: ${{ needs.build-and-push.outputs.frontend_image }}:staging
          DEPLOY_SHA: ${{ github.sha }}
          CR_PAT: ${{ secrets.CR_PAT }}
          GH_ACTOR: ${{ github.actor }}
          faskplusai_POSTGRES_USER: ${{ secrets.faskplusai_POSTGRES_USER }}
          faskplusai_POSTGRES_PWD: ${{ secrets.faskplusai_POSTGRES_PWD }}
          faskplusai_POSTGRES_STAGING_DATABASE: ${{ secrets.faskplusai_POSTGRES_STAGING_DATABASE}}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
          FRONTEND_DOMAIN: ${{ secrets.STAGING_FRONTEND_DOMAIN }}
          API_DOMAIN: ${{ secrets.STAGING_API_DOMAIN }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: BACKEND_IMG,FRONTEND_IMG,DEPLOY_SHA,CR_PAT,GH_ACTOR,faskplusai_POSTGRES_USER,faskplusai_POSTGRES_PWD,faskplusai_POSTGRES_STAGING_DATABASE,GEMINI_API_KEY,ACME_EMAIL,FRONTEND_DOMAIN,API_DOMAIN
          script: |
            set -e

            # ---- Ensure shared Traefik is running ----
            TRAEFIK_DIR=/home/deploy/opt/faskplusai/traefik
            mkdir -p $TRAEFIK_DIR
            docker network create traefik-public 2>/dev/null || true

            cat > $TRAEFIK_DIR/docker-compose.yml <<'TRAEFIKEOF'
            services:
              traefik:
                image: traefik:v3.6
                container_name: faskplusai_traefik
                command:
                  - "--api.dashboard=false"
                  - "--providers.docker=true"
                  - "--providers.docker.exposedbydefault=false"
                  - "--providers.docker.network=traefik-public"
                  - "--providers.file.directory=/etc/traefik/dynamic"
                  - "--providers.file.watch=true"
                  - "--entrypoints.web.address=:80"
                  - "--entrypoints.websecure.address=:443"
                  - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
                  - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
                  - "--log.level=WARN"
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - /var/run/docker.sock:/var/run/docker.sock:ro
                  - /etc/letsencrypt:/etc/letsencrypt:ro
                  - ./dynamic:/etc/traefik/dynamic:ro
                networks:
                  - traefik-public
                restart: unless-stopped
                security_opt:
                  - no-new-privileges:true

            networks:
              traefik-public:
                external: true
            TRAEFIKEOF

            # Auto-discover all certbot certificates
            mkdir -p $TRAEFIK_DIR/dynamic
            echo "tls:" > $TRAEFIK_DIR/dynamic/tls.yml
            echo "  certificates:" >> $TRAEFIK_DIR/dynamic/tls.yml
            for cert_dir in /etc/letsencrypt/live/*/; do
              domain=$(basename "$cert_dir")
              [ "$domain" = "README" ] && continue
              if [ -f "${cert_dir}fullchain.pem" ] && [ -f "${cert_dir}privkey.pem" ]; then
                echo "    - certFile: /etc/letsencrypt/live/${domain}/fullchain.pem" >> $TRAEFIK_DIR/dynamic/tls.yml
                echo "      keyFile: /etc/letsencrypt/live/${domain}/privkey.pem" >> $TRAEFIK_DIR/dynamic/tls.yml
              fi
            done

            cd $TRAEFIK_DIR && docker compose up -d

            # ---- Deploy staging ----
            APP_DIR=/home/deploy/opt/faskplusai/staging
            mkdir -p $APP_DIR && cd $APP_DIR

            # Write docker-compose file
            cat > docker-compose.yml <<'COMPOSE'
            services:
              db:
                image: postgres:15-alpine
                container_name: faskplusai_db_staging
                environment:
                  - POSTGRES_USER=${faskplusai_POSTGRES_USER}
                  - POSTGRES_PASSWORD=${faskplusai_POSTGRES_PWD}
                  - POSTGRES_DB=${faskplusai_POSTGRES_STAGING_DATABASE}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                networks:
                  - internal
                restart: unless-stopped
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${faskplusai_POSTGRES_USER}"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

              backend:
                image: ${BACKEND_IMG}
                environment:
                  DATABASE_URL: postgresql://${faskplusai_POSTGRES_USER}:${faskplusai_POSTGRES_PWD}@db:5432/${faskplusai_POSTGRES_STAGING_DATABASE}
                  GEMINI_API_KEY: ${GEMINI_API_KEY}
                  ENVIRONMENT: staging
                expose:
                  - "8000"
                depends_on:
                  db:
                    condition: service_healthy
                networks:
                  - internal
                  - traefik-public
                labels:
                  - "traefik.enable=true"
                  - "traefik.http.routers.staging-backend.rule=Host(`${API_DOMAIN}`)"
                  - "traefik.http.routers.staging-backend.entrypoints=websecure"
                  - "traefik.http.routers.staging-backend.tls=true"
                  - "traefik.http.services.staging-backend.loadbalancer.server.port=8000"
                  - "traefik.http.routers.staging-backend.middlewares=staging-backend-headers,staging-backend-ratelimit"
                  - "traefik.http.middlewares.staging-backend-headers.headers.stsSeconds=31536000"
                  - "traefik.http.middlewares.staging-backend-headers.headers.stsIncludeSubdomains=true"
                  - "traefik.http.middlewares.staging-backend-headers.headers.frameDeny=true"
                  - "traefik.http.middlewares.staging-backend-headers.headers.contentTypeNosniff=true"
                  - "traefik.http.middlewares.staging-backend-headers.headers.browserXssFilter=true"
                  - "traefik.http.middlewares.staging-backend-ratelimit.ratelimit.average=100"
                  - "traefik.http.middlewares.staging-backend-ratelimit.ratelimit.burst=50"
                  - "traefik.http.services.staging-backend.loadbalancer.healthCheck.path=/health"
                  - "traefik.http.services.staging-backend.loadbalancer.healthCheck.interval=5s"
                healthcheck:
                  test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
                  interval: 10s
                  timeout: 5s
                  retries: 3
                  start_period: 15s
                restart: unless-stopped

              frontend:
                image: ${FRONTEND_IMG}
                environment:
                  API_URL: http://backend:8000
                  NODE_ENV: production
                expose:
                  - "3000"
                depends_on:
                  - backend
                networks:
                  - internal
                  - traefik-public
                labels:
                  - "traefik.enable=true"
                  - "traefik.http.routers.staging-frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
                  - "traefik.http.routers.staging-frontend.entrypoints=websecure"
                  - "traefik.http.routers.staging-frontend.tls=true"
                  - "traefik.http.services.staging-frontend.loadbalancer.server.port=3000"
                  - "traefik.http.routers.staging-frontend.middlewares=staging-frontend-headers"
                  - "traefik.http.middlewares.staging-frontend-headers.headers.stsSeconds=31536000"
                  - "traefik.http.middlewares.staging-frontend-headers.headers.stsIncludeSubdomains=true"
                  - "traefik.http.middlewares.staging-frontend-headers.headers.frameDeny=true"
                  - "traefik.http.middlewares.staging-frontend-headers.headers.contentTypeNosniff=true"
                  - "traefik.http.middlewares.staging-frontend-headers.headers.browserXssFilter=true"
                  - "traefik.http.services.staging-frontend.loadbalancer.healthCheck.path=/"
                  - "traefik.http.services.staging-frontend.loadbalancer.healthCheck.interval=5s"
                healthcheck:
                  test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (res) => process.exit(res.statusCode === 200 ? 0 : 1))"]
                  interval: 10s
                  timeout: 5s
                  retries: 3
                  start_period: 15s
                restart: unless-stopped

            volumes:
              postgres_data:

            networks:
              internal:
                driver: bridge
              traefik-public:
                external: true
            COMPOSE

            # Write .env file
            cat > .env <<EOF
            faskplusai_POSTGRES_USER=${faskplusai_POSTGRES_USER}
            faskplusai_POSTGRES_PWD=${faskplusai_POSTGRES_PWD}
            faskplusai_POSTGRES_STAGING_DATABASE=${faskplusai_POSTGRES_STAGING_DATABASE}
            GEMINI_API_KEY=${GEMINI_API_KEY}
            FRONTEND_DOMAIN=${FRONTEND_DOMAIN}
            API_DOMAIN=${API_DOMAIN}
            BACKEND_IMG=${BACKEND_IMG}
            FRONTEND_IMG=${FRONTEND_IMG}
            DEPLOY_SHA=${DEPLOY_SHA}
            EOF

            # Log in to GHCR
            echo "${CR_PAT}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin

            # Pull latest images
            docker compose pull backend frontend

            # Ensure DB is running and healthy
            docker compose up -d --wait db

            # ---- Zero-downtime blue-green deployment ----
            SHORT_SHA=$(echo "${DEPLOY_SHA}" | cut -c1-6)
            echo "Deploying commit ${SHORT_SHA}..."

            # Find any existing backend/frontend containers
            OLD_BACKEND=$(docker ps -q --filter "label=faskplusai.service=staging-backend" | head -1)
            OLD_FRONTEND=$(docker ps -q --filter "label=faskplusai.service=staging-frontend" | head -1)

            # Start new containers with commit-hash names
            echo "==> Starting new containers (${SHORT_SHA})..."

            docker compose run -d \
              --name "staging-backend-${SHORT_SHA}" \
              -l "faskplusai.service=staging-backend" \
              -l "faskplusai.sha=${SHORT_SHA}" \
              --no-deps backend

            docker compose run -d \
              --name "staging-frontend-${SHORT_SHA}" \
              -l "faskplusai.service=staging-frontend" \
              -l "faskplusai.sha=${SHORT_SHA}" \
              --no-deps frontend

            NEW_BACKEND=$(docker ps -q --filter "name=staging-backend-${SHORT_SHA}")
            NEW_FRONTEND=$(docker ps -q --filter "name=staging-frontend-${SHORT_SHA}")

            # Wait for new containers to pass health checks
            echo "Waiting for new containers to pass health checks..."
            TIMEOUT=90
            ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              BE_STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$NEW_BACKEND" 2>/dev/null || echo "starting")
              FE_STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$NEW_FRONTEND" 2>/dev/null || echo "starting")
              if [ "$BE_STATUS" = "healthy" ] && [ "$FE_STATUS" = "healthy" ]; then
                echo "New containers (${SHORT_SHA}) healthy!"
                break
              fi
              echo "  backend=${BE_STATUS} frontend=${FE_STATUS} (${ELAPSED}s/${TIMEOUT}s)"
              sleep 3
              ELAPSED=$((ELAPSED + 3))
            done

            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "ERROR: New containers failed health checks within ${TIMEOUT}s. Rolling back..."
              docker stop "staging-backend-${SHORT_SHA}" "staging-frontend-${SHORT_SHA}" 2>/dev/null || true
              docker rm "staging-backend-${SHORT_SHA}" "staging-frontend-${SHORT_SHA}" 2>/dev/null || true
              echo "Rollback complete — old containers still serving traffic"
              exit 1
            fi

            # Drain old containers — disconnect from Traefik so it stops routing to them
            if [ -n "$OLD_BACKEND" ] || [ -n "$OLD_FRONTEND" ]; then
              echo "Draining old containers..."
              [ -n "$OLD_BACKEND" ] && docker network disconnect traefik-public "$OLD_BACKEND" 2>/dev/null || true
              [ -n "$OLD_FRONTEND" ] && docker network disconnect traefik-public "$OLD_FRONTEND" 2>/dev/null || true
              sleep 5
              [ -n "$OLD_BACKEND" ] && { docker stop --time 10 "$OLD_BACKEND"; docker rm "$OLD_BACKEND"; } 2>/dev/null || true
              [ -n "$OLD_FRONTEND" ] && { docker stop --time 10 "$OLD_FRONTEND"; docker rm "$OLD_FRONTEND"; } 2>/dev/null || true
            fi

            echo "Deployment of ${SHORT_SHA} complete!"

            # Cleanup unused images
            docker image prune -af --filter "until=168h"

            # Show status
            docker compose ps
            docker ps --filter "label=faskplusai.service" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /home/deploy/opt/faskplusai/staging
            docker compose ps
            if docker compose exec backend python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" 2>/dev/null; then
              echo "Staging backend is healthy!"
            else
              echo "Health check failed"
              docker compose logs --tail=20
              exit 1
            fi
