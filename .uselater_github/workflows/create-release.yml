name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  create-release:
    name: Create Release Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! [[ "${{ github.event.inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format. Use: X.Y.Z (e.g., 1.0.0)"
            exit 1
          fi
          echo "✅ Version format valid"

      - name: Check if tag exists
        run: |
          git fetch --tags
          if git tag | grep -q "^v${{ github.event.inputs.version }}$"; then
            echo "❌ Tag v${{ github.event.inputs.version }} already exists"
            exit 1
          fi
          echo "✅ Tag is unique"

      - name: Configure git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Create and push tag
        run: |
          git tag -a "v${{ github.event.inputs.version }}" -m "Release v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"
          echo "✅ Tag v${{ github.event.inputs.version }} created and pushed"

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "First release - no previous tag"
            CHANGELOG="Initial release"
          else
            echo "Generating changelog from $PREVIOUS_TAG to v${{ github.event.inputs.version }}"
            CHANGELOG=$(git log $PREVIOUS_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "🎉 Release tag created!"
          echo "📦 Version: v${{ github.event.inputs.version }}"
          echo "🔖 Type: ${{ github.event.inputs.release_type }}"
          echo ""
          echo "⏭️ Next: Production deployment will start automatically"
          echo "🔗 Monitor: https://github.com/${{ github.repository }}/actions"
